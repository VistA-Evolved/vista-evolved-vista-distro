# Decision Index — VistA Evolved Distro
#
# Enterprise namespace: VE-DISTRO-ADR-NNNN
# Cross-repo namespaces: VE-GOV-, VE-ARCH-, VE-PLAT-, VE-DISTRO-
#
# Every ADR in docs/adrs/ MUST be registered here.
# CI gate: scripts/governance/check-adr-index.sh

decisions:
  - id: VE-DISTRO-ADR-0001
    title: Upstream-overlay policy
    status: accepted
    file: docs/adrs/VE-DISTRO-ADR-0001-upstream-overlay-policy.md
    legacy_id: ADR-0001
    date: 2025-07-12
    summary: >
      Upstream sources are fetched/pinned and read-only. All customizations
      live in overlay/ (routines, install, patches). Lock file is the contract.

  - id: VE-DISTRO-ADR-0002
    title: Local-source-first builds
    status: accepted
    file: docs/adrs/VE-DISTRO-ADR-0002-local-source-first-builds.md
    legacy_id: ADR-0002
    date: 2025-07-12
    summary: >
      Builds consume local upstream + overlay only. No fetch at build time.
      Lock file records what version of upstream is used.

  - id: VE-DISTRO-ADR-0003
    title: UTF-8 lane is the primary planned operator lane
    status: accepted
    file: docs/adrs/VE-DISTRO-ADR-0003-utf8-primary-lane.md
    legacy_id: ADR-0003
    date: 2025-07-13
    summary: >
      UTF-8 lane is the primary planned operator lane. M-mode is rollback/reference/safety.
      English baseline; Korean and Spanish are bounded product languages.
      Terminal not fully signed off under UTF-8; no overclaims.
